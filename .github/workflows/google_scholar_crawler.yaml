name: Get Citation Data

on:
  workflow_dispatch:
  page_build:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch citation data
        run: |
          cd google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

      - name: Publish citation data
        run: |
          cd google_scholar_crawler/results
          git init
          git checkout -b google-scholar-stats
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin google-scholar-stats --force
